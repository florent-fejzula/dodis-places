<div class="recipes-page">
  <!-- Page header -->
  <div class="page-header">
    <h1 class="page-title">Recipes</h1>
    <button *ngIf="isAdmin()" class="add-btn" (click)="showAddForm.set(true)">
      + Add Recipe
    </button>
  </div>

  <!-- Horizontal category filter bar -->
  <div class="cat-bar-wrap">
    <div class="cat-bar">
      <button
        class="cat-chip"
        [class.active]="!selectedCategory()"
        (click)="selectCategory('')"
      >All</button>
      <button
        class="cat-chip"
        *ngFor="let c of categories()"
        [class.active]="selectedCategory() === c"
        (click)="selectCategory(c)"
      >{{ c }}</button>
    </div>
  </div>

  <!-- Time filter bar -->
  <div class="time-bar-wrap" *ngIf="timeBuckets().length > 0">
    <div class="time-bar">
      <button
        class="time-chip"
        [class.active]="selectedTime() === null"
        (click)="selectTime(null)"
      >Any time</button>
      <button
        class="time-chip"
        *ngFor="let b of timeBuckets()"
        [class.active]="selectedTime() === b.maxMinutes"
        (click)="selectTime(b.maxMinutes)"
      >≤ {{ b.label }}</button>
    </div>
  </div>

  <!-- Cards grid -->
  <div class="recipes-container">
    <div class="recipes-section" *ngFor="let section of groupedRecipes()">
      <div class="section-title">{{ section.category }}</div>

      <div class="section-grid">
        <div
          class="recipe-card"
          *ngFor="let recipe of section.items"
          (click)="openDetails(recipe)"
          [style.backgroundImage]="'url(' + recipe.image + ')'"
          title="Click for details"
        >
          <button
            class="delete-x"
            *ngIf="isAdmin()"
            (click)="deleteRecipe(recipe, $event)"
            aria-label="Delete recipe"
            title="Delete"
          >×</button>

          <div class="overlay">
            <span class="card-time" *ngIf="recipe.time">{{ recipe.time }}</span>
            <h2>{{ recipe.name }}</h2>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Recipe modal (now a proper modal instead of inline in sidebar) -->
<div
  class="modal"
  *ngIf="showAddForm() && isAdmin()"
  (click)="showAddForm.set(false)"
>
  <div class="modal-card form-card" (click)="$event.stopPropagation()">
    <button class="close" (click)="showAddForm.set(false)" aria-label="Close">
      ×
    </button>

    <div class="modal-content">
      <h3>Add Recipe</h3>

      <form
        class="add-form"
        (ngSubmit)="addRecipe()"
        (paste)="onPasteImage($event)"
        autocomplete="off"
      >
        <label>
          Name
          <input [(ngModel)]="newRecipe.name" name="name" required />
        </label>

        <!-- Image block -->
        <div class="img-row" (paste)="onPasteImage($event)">
          <div class="grow">
            <label for="imageUrl">Image (paste Ctrl+V, upload or URL)</label>
            <div class="img-controls">
              <button
                type="button"
                class="button"
                (click)="triggerFilePicker()"
              >
                Upload image
              </button>

              <input
                #fileInput
                type="file"
                accept="image/*"
                (change)="onFileSelected($event)"
                hidden
              />

              <input
                id="imageUrl"
                [(ngModel)]="newRecipe.image"
                name="imageUrl"
                placeholder="Or paste image URL"
              />
            </div>
          </div>
        </div>

        <div class="preview" *ngIf="newRecipe.image">
          <img [src]="newRecipe.image" alt="Preview" />
        </div>

        <!-- Category dropdown -->
        <label>
          Category
          <select
            [ngModel]="categoryChoice"
            (ngModelChange)="onCategoryChange($event)"
            name="categorySel"
            required
          >
            <option value="" disabled>Select category</option>
            <option *ngFor="let c of categories()" [value]="c">{{ c }}</option>
            <option [value]="NEW_OPT">+ New category…</option>
          </select>
        </label>

        <label *ngIf="categoryChoice === NEW_OPT">
          New category
          <input [(ngModel)]="newCategory" name="newCategory" />
        </label>

        <label>
          Time (optional, e.g. 30 mins, 1 hr)
          <input [(ngModel)]="newRecipe.time" name="time" placeholder="e.g. 30 mins" />
        </label>

        <label>
          Notes (tips / ingredients)
          <textarea
            [(ngModel)]="newRecipe.notes"
            name="notes"
            rows="3"
          ></textarea>
        </label>

        <label>
          Source URL (YouTube / blog)
          <input [(ngModel)]="newRecipe.sourceUrl" name="sourceUrl" />
        </label>

        <div class="form-actions">
          <button type="button" class="ghost" (click)="showAddForm.set(false)">
            Cancel
          </button>
          <button type="submit" class="save">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Detail page (full-screen) -->
<div class="detail-page" *ngIf="showDetail()">
  <div class="detail-pg-header">
    <div class="detail-pg-topbar">
      <button class="detail-back" (click)="closeDetails()">← Back</button>
      <button *ngIf="isAdmin() && !editMode()" class="detail-edit-btn" (click)="startEdit()">Edit</button>
      <span *ngIf="editMode()" class="detail-editing-label">Editing</span>
    </div>
    <h1 class="detail-pg-title">{{ detailRecipe()?.name }}</h1>
    <div class="detail-pg-meta">
      <span class="detail-pg-tag">{{ detailRecipe()?.category }}</span>
      <span class="detail-pg-time" *ngIf="detailRecipe()?.time && !editMode()">{{ detailRecipe()?.time }}</span>
    </div>
  </div>

  <div class="detail-pg-image">
    <img [src]="detailRecipe()?.image" [alt]="detailRecipe()?.name" />
  </div>

  <div class="detail-pg-content">
    <!-- view mode -->
    <ng-container *ngIf="!editMode()">
      <div class="detail-notes" *ngIf="detailRecipe()?.notes">
        <div class="detail-notes-label">Notes</div>
        <p>{{ detailRecipe()?.notes }}</p>
      </div>

      <a
        class="detail-source"
        *ngIf="detailRecipe()?.sourceUrl"
        [href]="detailRecipe()?.sourceUrl!"
        target="_blank"
        rel="noopener"
      >
        <span>View full recipe</span>
        <span class="detail-source-arrow">→</span>
      </a>
    </ng-container>

    <!-- edit mode (admin) -->
    <ng-container *ngIf="editMode()">
      <label class="detail-edit-label">
        Time
        <input class="detail-edit-input" [(ngModel)]="editTimeText" placeholder="e.g. 30 mins, 1 hr" />
      </label>
      <label class="detail-edit-label">
        Notes
        <textarea class="detail-edit-textarea" [(ngModel)]="editNotesText" rows="6"></textarea>
      </label>
      <div class="detail-edit-actions">
        <button class="detail-edit-cancel" (click)="cancelEdit()">Cancel</button>
        <button class="detail-edit-save" (click)="saveEdit()">Save</button>
      </div>
    </ng-container>
  </div>
</div>

<!-- Cropper modal (for upload-before-save cropping) -->
<div class="modal" *ngIf="showCropper" (click)="closeCropper()">
  <div class="modal-card cropper-card" (click)="$event.stopPropagation()">
    <button class="close" (click)="closeCropper()" aria-label="Close">×</button>

    <div class="modal-content">
      <h3>Crop image</h3>

      <div class="crop-controls">
        <label class="ratio-toggle">
          <input type="checkbox" [(ngModel)]="lockAspectRatio" />
          Lock to card ratio (16:9)
        </label>
      </div>

      <image-cropper
        [imageFile]="cropFile!"
        [maintainAspectRatio]="lockAspectRatio"
        [aspectRatio]="16 / 9"
        [resizeToWidth]="1400"
        format="webp"
        (imageCropped)="onImageCropped($event)"
      ></image-cropper>

      <div class="crop-actions">
        <button type="button" class="ghost" (click)="closeCropper()">
          Cancel
        </button>
        <button type="button" class="save" (click)="applyCroppedImage()">
          Use photo
        </button>
      </div>
    </div>
  </div>
</div>
