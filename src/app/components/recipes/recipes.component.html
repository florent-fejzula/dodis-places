<div class="recipes-layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="menu-header" (click)="selectCategory('')">Menu</div>
    <ul>
      <li
        *ngFor="let c of categories()"
        (click)="selectCategory(c)"
        [ngClass]="{ active: selectedCategory() === c }"
      >
        {{ c }}
      </li>
    </ul>

    <!-- Admin-only add button & form -->
    <div class="admin-tools" *ngIf="isAdmin()">
      <button class="add-btn" (click)="showAddForm.set(!showAddForm())">
        {{ showAddForm() ? "Close" : "Add Recipe" }}
      </button>

      <form
        class="add-form"
        *ngIf="showAddForm()"
        (ngSubmit)="addRecipe()"
        (paste)="onPasteImage($event)"
        autocomplete="off"
      >
        <label>
          Name
          <input [(ngModel)]="newRecipe.name" name="name" required />
        </label>

        <!-- Image block -->
        <div class="img-row" (paste)="onPasteImage($event)">
          <div class="grow">
            <label for="imageUrl">Image (paste Ctrl+V, upload or URL)</label>
            <div class="img-controls">
              <button
                type="button"
                class="button"
                (click)="triggerFilePicker()"
              >
                Upload image
              </button>

              <input
                #fileInput
                type="file"
                accept="image/*"
                (change)="onFileSelected($event)"
                hidden
              />

              <input
                id="imageUrl"
                [(ngModel)]="newRecipe.image"
                name="imageUrl"
                placeholder="Or paste image URL"
              />
            </div>
          </div>
        </div>

        <div class="preview" *ngIf="newRecipe.image">
          <img [src]="newRecipe.image" alt="Preview" />
        </div>

        <!-- Category dropdown -->
        <label>
          Category
          <select
            [ngModel]="categoryChoice"
            (ngModelChange)="onCategoryChange($event)"
            name="categorySel"
            required
          >
            <option value="" disabled>Select category</option>
            <option *ngFor="let c of categories()" [value]="c">{{ c }}</option>
            <option [value]="NEW_OPT">+ New category…</option>
          </select>
        </label>

        <label *ngIf="categoryChoice === NEW_OPT">
          New category
          <input [(ngModel)]="newCategory" name="newCategory" />
        </label>

        <label>
          Notes (tips / ingredients)
          <textarea
            [(ngModel)]="newRecipe.notes"
            name="notes"
            rows="3"
          ></textarea>
        </label>

        <label>
          Source URL (YouTube / blog)
          <input [(ngModel)]="newRecipe.sourceUrl" name="sourceUrl" />
        </label>

        <button type="submit" class="save">Save</button>
      </form>
    </div>
  </div>

  <!-- Cards grid -->
  <div class="recipes-container">
    <div class="recipes-section" *ngFor="let section of groupedRecipes()">
      <div class="section-title">{{ section.category }}</div>

      <div class="section-grid">
        <div
          class="recipe-card"
          *ngFor="let recipe of section.items"
          (click)="openDetails(recipe)"
          [style.backgroundImage]="'url(' + recipe.image + ')'"
          title="Click for details"
        >
          <button
            class="delete-x"
            *ngIf="isAdmin()"
            (click)="deleteRecipe(recipe, $event)"
            aria-label="Delete recipe"
            title="Delete"
          >
            ×
          </button>

          <div class="overlay">
            <h2>{{ recipe.name }}</h2>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal" *ngIf="showDetail()" (click)="closeDetails()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <button class="close" (click)="closeDetails()" aria-label="Close">×</button>

    <img
      class="hero"
      [src]="detailRecipe()?.image"
      [alt]="detailRecipe()?.name"
    />

    <div class="modal-content">
      <h3>{{ detailRecipe()?.name }}</h3>

      <div class="meta">
        <span class="pill">{{ detailRecipe()?.category }}</span>
      </div>

      <div class="notes" *ngIf="detailRecipe()?.notes">
        <h4>Notes</h4>
        <p>{{ detailRecipe()?.notes }}</p>
      </div>

      <a
        class="source"
        *ngIf="detailRecipe()?.sourceUrl"
        [href]="detailRecipe()?.sourceUrl!"
        target="_blank"
        rel="noopener"
      >
        Open source link →
      </a>
    </div>
  </div>
</div>

<!-- Cropper modal (for upload-before-save cropping) -->
<div class="modal" *ngIf="showCropper" (click)="closeCropper()">
  <div class="modal-card cropper-card" (click)="$event.stopPropagation()">
    <button class="close" (click)="closeCropper()" aria-label="Close">×</button>

    <div class="modal-content">
      <h3>Crop image</h3>

      <div class="crop-controls">
        <label class="ratio-toggle">
          <input type="checkbox" [(ngModel)]="lockAspectRatio" />
          Lock to card ratio (16:9)
        </label>
      </div>

      <!-- requires ngx-image-cropper -->
      <image-cropper
        [imageFile]="cropFile!"
        [maintainAspectRatio]="false"
        [resizeToWidth]="1400"
        format="webp"
        (imageCropped)="onImageCropped($event)"
      ></image-cropper>

      <div class="crop-actions">
        <button type="button" class="ghost" (click)="closeCropper()">
          Cancel
        </button>
        <button type="button" class="save" (click)="applyCroppedImage()">
          Use photo
        </button>
      </div>
    </div>
  </div>
</div>
