<div class="recipes-layout" [class.menu-open]="mobileMenuOpen()">
  <!-- Mobile top bar (shown only on mobile via CSS) -->
  <div class="mobile-topbar">
    <button
      class="hamburger"
      (click)="mobileMenuOpen.set(!mobileMenuOpen())"
      aria-label="Toggle categories"
    >
      <span></span><span></span><span></span>
    </button>
    <div class="mobile-title">
      {{ selectedCategory() || "All Recipes" }}
    </div>
    <button
      *ngIf="isAdmin()"
      class="mobile-add"
      (click)="showAddForm.set(true); mobileMenuOpen.set(false)"
      aria-label="Add recipe"
    >
      +
    </button>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div
      class="menu-header"
      (click)="selectCategory(''); mobileMenuOpen.set(false)"
    >
      Menu
    </div>
    <ul>
      <li
        *ngFor="let c of categories()"
        (click)="selectCategory(c); mobileMenuOpen.set(false)"
        [ngClass]="{ active: selectedCategory() === c }"
      >
        {{ c }}
      </li>
    </ul>

    <!-- Admin-only add button (desktop) -->
    <div class="admin-tools" *ngIf="isAdmin()">
      <button class="add-btn" (click)="showAddForm.set(true)">
        Add Recipe
      </button>
    </div>
  </div>

  <!-- Backdrop for mobile menu -->
  <div
    class="mobile-backdrop"
    *ngIf="mobileMenuOpen()"
    (click)="mobileMenuOpen.set(false)"
  ></div>

  <!-- Cards grid -->
  <div class="recipes-container">
    <div class="recipes-section" *ngFor="let section of groupedRecipes()">
      <div class="section-title">{{ section.category }}</div>

      <div class="section-grid">
        <div
          class="recipe-card"
          *ngFor="let recipe of section.items"
          (click)="openDetails(recipe)"
          [style.backgroundImage]="'url(' + recipe.image + ')'"
          title="Click for details"
        >
          <button
            class="delete-x"
            *ngIf="isAdmin()"
            (click)="deleteRecipe(recipe, $event)"
            aria-label="Delete recipe"
            title="Delete"
          >
            ×
          </button>

          <div class="overlay">
            <h2>{{ recipe.name }}</h2>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Recipe modal (now a proper modal instead of inline in sidebar) -->
<div
  class="modal"
  *ngIf="showAddForm() && isAdmin()"
  (click)="showAddForm.set(false)"
>
  <div class="modal-card form-card" (click)="$event.stopPropagation()">
    <button class="close" (click)="showAddForm.set(false)" aria-label="Close">
      ×
    </button>

    <div class="modal-content">
      <h3>Add Recipe</h3>

      <form
        class="add-form"
        (ngSubmit)="addRecipe()"
        (paste)="onPasteImage($event)"
        autocomplete="off"
      >
        <label>
          Name
          <input [(ngModel)]="newRecipe.name" name="name" required />
        </label>

        <!-- Image block -->
        <div class="img-row" (paste)="onPasteImage($event)">
          <div class="grow">
            <label for="imageUrl">Image (paste Ctrl+V, upload or URL)</label>
            <div class="img-controls">
              <button
                type="button"
                class="button"
                (click)="triggerFilePicker()"
              >
                Upload image
              </button>

              <input
                #fileInput
                type="file"
                accept="image/*"
                (change)="onFileSelected($event)"
                hidden
              />

              <input
                id="imageUrl"
                [(ngModel)]="newRecipe.image"
                name="imageUrl"
                placeholder="Or paste image URL"
              />
            </div>
          </div>
        </div>

        <div class="preview" *ngIf="newRecipe.image">
          <img [src]="newRecipe.image" alt="Preview" />
        </div>

        <!-- Category dropdown -->
        <label>
          Category
          <select
            [ngModel]="categoryChoice"
            (ngModelChange)="onCategoryChange($event)"
            name="categorySel"
            required
          >
            <option value="" disabled>Select category</option>
            <option *ngFor="let c of categories()" [value]="c">{{ c }}</option>
            <option [value]="NEW_OPT">+ New category…</option>
          </select>
        </label>

        <label *ngIf="categoryChoice === NEW_OPT">
          New category
          <input [(ngModel)]="newCategory" name="newCategory" />
        </label>

        <label>
          Notes (tips / ingredients)
          <textarea
            [(ngModel)]="newRecipe.notes"
            name="notes"
            rows="3"
          ></textarea>
        </label>

        <label>
          Source URL (YouTube / blog)
          <input [(ngModel)]="newRecipe.sourceUrl" name="sourceUrl" />
        </label>

        <div class="form-actions">
          <button type="button" class="ghost" (click)="showAddForm.set(false)">
            Cancel
          </button>
          <button type="submit" class="save">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal" *ngIf="showDetail()" (click)="closeDetails()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <button class="close" (click)="closeDetails()" aria-label="Close">×</button>

    <img
      class="hero"
      [src]="detailRecipe()?.image"
      [alt]="detailRecipe()?.name"
    />

    <div class="modal-content">
      <h3>{{ detailRecipe()?.name }}</h3>

      <div class="meta">
        <span class="pill">{{ detailRecipe()?.category }}</span>
      </div>

      <div class="notes" *ngIf="detailRecipe()?.notes">
        <h4>Notes</h4>
        <p>{{ detailRecipe()?.notes }}</p>
      </div>

      <a
        class="source"
        *ngIf="detailRecipe()?.sourceUrl"
        [href]="detailRecipe()?.sourceUrl!"
        target="_blank"
        rel="noopener"
      >
        Open source link →
      </a>
    </div>
  </div>
</div>

<!-- Cropper modal (for upload-before-save cropping) -->
<div class="modal" *ngIf="showCropper" (click)="closeCropper()">
  <div class="modal-card cropper-card" (click)="$event.stopPropagation()">
    <button class="close" (click)="closeCropper()" aria-label="Close">×</button>

    <div class="modal-content">
      <h3>Crop image</h3>

      <div class="crop-controls">
        <label class="ratio-toggle">
          <input type="checkbox" [(ngModel)]="lockAspectRatio" />
          Lock to card ratio (16:9)
        </label>
      </div>

      <image-cropper
        [imageFile]="cropFile!"
        [maintainAspectRatio]="false"
        [resizeToWidth]="1400"
        format="webp"
        (imageCropped)="onImageCropped($event)"
      ></image-cropper>

      <div class="crop-actions">
        <button type="button" class="ghost" (click)="closeCropper()">
          Cancel
        </button>
        <button type="button" class="save" (click)="applyCroppedImage()">
          Use photo
        </button>
      </div>
    </div>
  </div>
</div>
